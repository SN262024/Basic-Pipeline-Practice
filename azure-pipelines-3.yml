trigger: none
pool: ALZ1-AgentPool

steps:

- task: TerraformInstaller@1
  displayName: Terraform Install
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  displayName: Terraform Init
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments /dev'
    backendServiceArm: 'service-connection-terraform'
    backendAzureRmResourceGroupName: 'rg-surendra'
    backendAzureRmStorageAccountName: 'stgsurendra'
    backendAzureRmContainerName: 'containersurendra'
    backendAzureRmKey: 'dev.tfstate'


- task: TerraformTask@5
  displayName: Terraform Plan
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments /dev'
    environmentServiceNameAzureRM: 'service-connection-terraform'


- task: TerraformTask@5
  displayName: Terraform Apply
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments /dev'
    commandOptions: '-auto-approve'
    environmentServiceNameAzureRM: 'service-connection-terraform'
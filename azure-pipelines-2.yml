
trigger: none
pool: ALZ1-AgentPool

stages:

- stage: Plan
  displayName: Terraform Plan Stage

  jobs:

  - job: TerraformPlan
    displayName: Terraform Plan Job

    steps:

    - task: TerraformInstaller@1
      displayName: Terraform Install
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev'
        backendServiceArm: 'ALZ-ServiceConnection'
        backendAzureRmResourceGroupName: 'rg-surendra'
        backendAzureRmStorageAccountName: 'stgsurendra'
        backendAzureRmContainerName: 'containersurendra'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        commandOptions: '-out=tfplan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev'
        environmentServiceNameAzureRM: 'ALZ-ServiceConnection'

    - task: PublishPipelineArtifact@1
      displayName: Publish Terraform Plan
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev/tfplan'
        artifact: 'tfplan'


- stage: Approval
  displayName: Manual Approval Stage
  dependsOn: Plan

  jobs:

  - job: ManualApproval
    displayName: Manual Approval
    pool: server

    steps:

    - task: ManualValidation@0
      timeoutInMinutes: 1440
      inputs:
        notifyUsers: 'surendrachauhan18@gmail.com'
        instructions: |
          Please review Terraform Plan output.
          Approve to continue Terraform Apply.


- stage: Apply
  displayName: Terraform Apply Stage
  dependsOn: Approval

  jobs:

  - job: TerraformApply
    displayName: Terraform Apply Job

    steps:

    # - task: TerraformInstaller@1
    #   displayName: Terraform Install
    #   inputs:
    #     terraformVersion: 'latest'

    - task: DownloadPipelineArtifact@2
      displayName: Download Terraform Plan
      inputs:
        artifact: 'tfplan'
        path: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev'
        backendServiceArm: 'ALZ-ServiceConnection'
        backendAzureRmResourceGroupName: 'rg-surendra'
        backendAzureRmStorageAccountName: 'stgsurendra'
        backendAzureRmContainerName: 'containersurendra'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        commandOptions: 'tfplan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_landing_zone/environments/dev'
        environmentServiceNameAzureRM: 'ALZ-ServiceConnection'